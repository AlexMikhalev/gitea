name: Release Container (Multi-Registry)

on:
  push:
    tags:
      - "v1.*"
      - "!v1*-rc*"
      - "!v1*-dev"
  workflow_dispatch:

env:
  GITEA_REGISTRY: git.terraphim.cloud
  GITHUB_REGISTRY: ghcr.io

jobs:
  container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - run: git fetch --unshallow --quiet --tags --force

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Metadata for GHCR
      - uses: docker/metadata-action@v5
        id: meta_ghcr
        with:
          images: |
            ghcr.io/terraphim/gitea
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Metadata for Gitea Registry
      - uses: docker/metadata-action@v5
        id: meta_gitea
        with:
          images: |
            git.terraphim.cloud/terraphim/gitea
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      # Metadata for GHCR (rootless)
      - uses: docker/metadata-action@v5
        id: meta_ghcr_rootless
        with:
          images: |
            ghcr.io/terraphim/gitea
          flavor: |
            suffix=-rootless,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}

      # Metadata for Gitea (rootless)
      - uses: docker/metadata-action@v5
        id: meta_gitea_rootless
        with:
          images: |
            git.terraphim.cloud/terraphim/gitea
          flavor: |
            suffix=-rootless,onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=semver,pattern={{major}}.{{minor}}

      # Login to GHCR
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Login to Gitea Registry
      - name: Login to Gitea Registry
        uses: docker/login-action@v3
        with:
          registry: git.terraphim.cloud
          username: ${{ secrets.GITEA_USERNAME }}
          password: ${{ secrets.GITEA_TOKEN }}

      # Build and push to GHCR (regular)
      - name: Build and push to GHCR (regular)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_ghcr.outputs.tags }}
          annotations: ${{ steps.meta_ghcr.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push to Gitea (regular)
      - name: Build and push to Gitea (regular)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_gitea.outputs.tags }}
          annotations: ${{ steps.meta_gitea.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push to GHCR (rootless)
      - name: Build and push to GHCR (rootless)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          file: Dockerfile.rootless
          tags: ${{ steps.meta_ghcr_rootless.outputs.tags }}
          annotations: ${{ steps.meta_ghcr_rootless.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push to Gitea (rootless)
      - name: Build and push to Gitea (rootless)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          file: Dockerfile.rootless
          tags: ${{ steps.meta_gitea_rootless.outputs.tags }}
          annotations: ${{ steps.meta_gitea_rootless.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
